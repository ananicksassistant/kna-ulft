services:
  - type: web
    name: kna-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        value: /app/data/kna.db
    disk:
      name: kna-data
      mountPath: /app/data
      sizeGB: 1
